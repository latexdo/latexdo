name: latexdo-release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: latexdo-release
  cancel-in-progress: true

jobs:
  quality:
    name: test / typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run typecheck

  build_macos:
    name: build / macOS
    needs: quality
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Python for native modules
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Configure node-gyp Python
        shell: bash
        run: |
          echo "PYTHON=${{ steps.setup-python.outputs.python-path }}" >> "$GITHUB_ENV"
          echo "NODE_GYP_FORCE_PYTHON=${{ steps.setup-python.outputs.python-path }}" >> "$GITHUB_ENV"

      - run: npm ci
      - run: npm run build

      - name: Select macOS signing mode
        id: macos_signing
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          missing=()
          for name in CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "macos_note=unsigned" >> "$GITHUB_OUTPUT"
            {
              echo "### macOS signing"
              echo
              echo "Building an unsigned macOS DMG because signing/notarization secrets are missing:"
              printf -- "- %s\n" "${missing[@]}"
              echo
              echo "Users must allow the app in System Settings > Privacy & Security after download."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "signed=true" >> "$GITHUB_OUTPUT"
          echo "macos_note=signed and notarized" >> "$GITHUB_OUTPUT"

      - name: Package signed macOS DMG
        if: ${{ steps.macos_signing.outputs.signed == 'true' }}
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: >
          npx electron-builder
          --mac dmg
          --arm64
          --publish never
          --config.mac.forceCodeSigning=true
          --config.mac.notarize=true
          --config.directories.output=release/macos

      - name: Package unsigned macOS DMG
        if: ${{ steps.macos_signing.outputs.signed != 'true' }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        shell: bash
        run: |
          unset CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID
          npx electron-builder \
            --mac dmg \
            --arm64 \
            --publish never \
            --config.mac.identity=- \
            --config.directories.output=release/macos

      - name: Prepare artifact
        shell: bash
        run: |
          pkg="$(find release/macos -maxdepth 1 -type f -name '*.dmg' -print -quit)"
          [ -n "$pkg" ] || { echo "No DMG produced"; exit 1; }
          mkdir -p artifacts
          cp "$pkg" artifacts/LatexDo-macos-arm64.dmg

      - name: Verify macOS notarization
        if: ${{ steps.macos_signing.outputs.signed == 'true' }}
        shell: bash
        run: |
          mount_dir="$(mktemp -d)"
          cleanup() {
            hdiutil detach "$mount_dir" -quiet || true
            rm -rf "$mount_dir"
          }
          trap cleanup EXIT

          hdiutil attach artifacts/LatexDo-macos-arm64.dmg \
            -nobrowse \
            -readonly \
            -mountpoint "$mount_dir"

          app_path="$(find "$mount_dir" -maxdepth 1 -name '*.app' -print -quit)"
          [ -n "$app_path" ] || { echo "No app bundle found in DMG"; exit 1; }

          codesign --verify --deep --strict --verbose=2 "$app_path"
          xcrun stapler validate "$app_path"
          spctl --assess --type execute --verbose=4 "$app_path"

      - name: Verify unsigned macOS DMG mounts
        if: ${{ steps.macos_signing.outputs.signed != 'true' }}
        shell: bash
        run: |
          mount_dir="$(mktemp -d)"
          cleanup() {
            hdiutil detach "$mount_dir" -quiet || true
            rm -rf "$mount_dir"
          }
          trap cleanup EXIT

          hdiutil attach artifacts/LatexDo-macos-arm64.dmg \
            -nobrowse \
            -readonly \
            -mountpoint "$mount_dir"

          app_path="$(find "$mount_dir" -maxdepth 1 -name '*.app' -print -quit)"
          [ -n "$app_path" ] || { echo "No app bundle found in DMG"; exit 1; }

      - name: Add unsigned macOS install note
        if: ${{ steps.macos_signing.outputs.signed != 'true' }}
        shell: bash
        run: cp .github/MACOS_UNSIGNED_INSTALL.md artifacts/README-macos-unsigned.txt

      - uses: actions/upload-artifact@v7
        with:
          name: latexdo-macos
          path: artifacts/*
          if-no-files-found: error
          retention-days: 1

  build_windows:
    name: build / Windows
    needs: quality
    runs-on: windows-2022
    timeout-minutes: 30
    env:
      GYP_MSVS_VERSION: "2022"
      npm_config_msvs_version: "2022"

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Python for native modules
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Configure node-gyp Python
        shell: pwsh
        run: |
          "PYTHON=${{ steps.setup-python.outputs.python-path }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "NODE_GYP_FORCE_PYTHON=${{ steps.setup-python.outputs.python-path }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - run: npm ci
      - run: npm run build

      - name: Package Windows installer
        run: >
          npx electron-builder
          --win nsis
          --x64
          --publish never
          --config.directories.output=release/windows

      - name: Prepare artifact
        shell: pwsh
        run: |
          $pkg = Get-ChildItem -Path "release/windows" -Filter "*.exe" -File | Select-Object -First 1
          if (-not $pkg) { throw "No EXE produced" }
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item $pkg.FullName artifacts/LatexDo-windows-x64.exe

      - uses: actions/upload-artifact@v7
        with:
          name: latexdo-windows
          path: artifacts/LatexDo-windows-x64.exe
          if-no-files-found: error
          retention-days: 1

  publish:
    name: publish / rolling release
    needs: [build_macos, build_windows]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: latexdo-*
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        shell: bash
        run: ls -lh artifacts/

      - name: Generate checksums
        shell: bash
        run: |
          cd artifacts
          sha256sum *.dmg *.exe > SHA256SUMS.txt

      - name: Delete old rolling release and tag
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release delete rolling --cleanup-tag --yes 2>/dev/null || true

      - name: Create rolling release
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          GIT_SHA: ${{ github.sha }}
        shell: bash
        run: |
          case "$EVENT_NAME" in
            push)
              notes="Automated build from main at ${GIT_SHA}."
              ;;
            *)
              notes="Manual rolling build from ${GIT_SHA}."
              ;;
          esac

          if [ -f artifacts/README-macos-unsigned.txt ]; then
            notes="${notes}

          macOS: this DMG is unsigned. After installing, open System Settings > Privacy & Security and choose Open Anyway for LatexDo if macOS blocks it or says it is damaged. The release includes README-macos-unsigned.txt with the same steps."
          else
            notes="${notes}

          macOS: this DMG is signed and notarized."
          fi

          gh release create rolling \
            --repo "${{ github.repository }}" \
            --title "Latest build ($(date +'%Y-%m-%d %H:%M UTC'))" \
            --notes "$notes" \
            --latest

      - name: Upload macOS artifact
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload rolling \
            --repo "${{ github.repository }}" \
            artifacts/LatexDo-macos-arm64.dmg --clobber

      - name: Upload unsigned macOS install note
        if: ${{ hashFiles('artifacts/README-macos-unsigned.txt') != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload rolling \
            --repo "${{ github.repository }}" \
            artifacts/README-macos-unsigned.txt --clobber

      - name: Upload Windows artifact
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload rolling \
            --repo "${{ github.repository }}" \
            artifacts/LatexDo-windows-x64.exe --clobber

      - name: Upload checksums
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload rolling \
            --repo "${{ github.repository }}" \
            artifacts/SHA256SUMS.txt --clobber
