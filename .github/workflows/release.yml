name: latexdo-release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: latexdo-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: test / typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run typecheck

  build_macos:
    name: build / macOS (${{ matrix.label }})
    needs: quality
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Apple Silicon
            runner: macos-15
            arch: arm64
            artifact: macos-arm64
            asset: LatexDo-macos-arm64.dmg
          - label: Intel
            runner: macos-15-intel
            arch: x64
            artifact: macos-x64
            asset: LatexDo-macos-x64.dmg

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Python for native modules
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Configure node-gyp Python
        shell: bash
        run: |
          echo "PYTHON=${{ steps.setup-python.outputs.python-path }}" >> "$GITHUB_ENV"
          echo "NODE_GYP_FORCE_PYTHON=${{ steps.setup-python.outputs.python-path }}" >> "$GITHUB_ENV"

      - run: npm ci
      - run: npm run build

      - name: Configure Apple signing and notarization
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          LEGACY_CSC_LINK: ${{ secrets.CSC_LINK }}
          LEGACY_CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          certificate_p12="${MACOS_CERTIFICATE_P12:-${LEGACY_CSC_LINK:-}}"
          certificate_password="${MACOS_CERTIFICATE_PASSWORD:-${LEGACY_CSC_KEY_PASSWORD:-}}"

          missing=()
          if [ -z "$certificate_p12" ]; then
            missing+=("MACOS_CERTIFICATE_P12")
          fi
          if [ -z "$certificate_password" ]; then
            missing+=("MACOS_CERTIFICATE_PASSWORD")
          fi
          for name in APPLE_API_KEY_P8 APPLE_API_KEY_ID APPLE_API_ISSUER APPLE_TEAM_ID; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::warning::Apple signing is disabled because these secrets are missing: ${missing[*]}"
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
            echo "MACOS_SIGNING_ENABLED=false" >> "$GITHUB_ENV"
            exit 0
          fi

          api_key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          if ! printf '%s' "$APPLE_API_KEY_P8" | base64 --decode > "$api_key_path"; then
            echo "::error::APPLE_API_KEY_P8 must be base64-encoded .p8 content."
            exit 1
          fi
          chmod 600 "$api_key_path"

          {
            echo "CSC_LINK=$certificate_p12"
            echo "CSC_KEY_PASSWORD=$certificate_password"
            echo "APPLE_API_KEY=$api_key_path"
            echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID"
            echo "APPLE_API_ISSUER=$APPLE_API_ISSUER"
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
            echo "MACOS_SIGNING_ENABLED=true"
          } >> "$GITHUB_ENV"

      - name: Disable Spotlight indexing
        run: sudo mdutil -a -i off

      - name: Sign, notarize, and package macOS DMG
        if: env.MACOS_SIGNING_ENABLED == 'true'
        run: >
          npx electron-builder
          --mac dmg zip
          --${{ matrix.arch }}
          --publish never
          --config.forceCodeSigning=true
          --config.directories.output=release/${{ matrix.arch }}

      - name: Package ad-hoc signed macOS DMG
        if: env.MACOS_SIGNING_ENABLED != 'true'
        shell: bash
        run: |
          npx electron-builder \
            --mac dir \
            --${{ matrix.arch }} \
            --publish never \
            --config.mac.identity=- \
            --config.mac.hardenedRuntime=false \
            --config.mac.notarize=false \
            --config.directories.output=release/${{ matrix.arch }}-app

          app_path="$(find "release/${{ matrix.arch }}-app" -type d -name 'LatexDo.app' -print -quit)"
          if [ -z "$app_path" ]; then
            echo "The packaged macOS app bundle was not found."
            exit 1
          fi

          codesign --force --deep --sign - "$app_path"
          codesign --verify --deep --strict --verbose=2 "$app_path"

          npx electron-builder \
            --mac dmg \
            --${{ matrix.arch }} \
            --prepackaged "$app_path" \
            --publish never \
            --config.mac.identity=- \
            --config.mac.hardenedRuntime=false \
            --config.mac.notarize=false \
            --config.directories.output=release/${{ matrix.arch }}

      - name: Test packaged macOS application
        shell: bash
        run: |
          executable="$(find "release/${{ matrix.arch }}" "release/${{ matrix.arch }}-app" -type f -path '*/LatexDo.app/Contents/MacOS/LatexDo' -print -quit 2>/dev/null || true)"
          if [ -z "$executable" ]; then
            echo "The packaged macOS executable was not found."
            exit 1
          fi
          "$executable" --smoke-test

      - name: Prepare artifact
        shell: bash
        run: |
          pkg="$(find "release/${{ matrix.arch }}" -maxdepth 1 -type f -name '*.dmg' -print -quit)"
          [ -n "$pkg" ] || { echo "No DMG produced"; exit 1; }
          mkdir -p artifacts
          cp "$pkg" "artifacts/${{ matrix.asset }}"

      - name: Verify Gatekeeper acceptance
        if: env.MACOS_SIGNING_ENABLED == 'true'
        run: >
          bash scripts/verify-macos-release.sh
          "artifacts/${{ matrix.asset }}"
          "$APPLE_TEAM_ID"

      - name: Verify ad-hoc macOS signature
        if: env.MACOS_SIGNING_ENABLED != 'true'
        run: >
          bash scripts/verify-macos-adhoc-release.sh
          "artifacts/${{ matrix.asset }}"

      - uses: actions/upload-artifact@v7
        with:
          name: latexdo-${{ matrix.artifact }}
          path: artifacts/*
          if-no-files-found: error
          retention-days: 1

  build_windows:
    name: build / Windows
    needs: quality
    runs-on: windows-2022
    timeout-minutes: 30
    env:
      GYP_MSVS_VERSION: "2022"
      npm_config_msvs_version: "2022"

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Python for native modules
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Configure node-gyp Python
        shell: pwsh
        run: |
          "PYTHON=${{ steps.setup-python.outputs.python-path }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "NODE_GYP_FORCE_PYTHON=${{ steps.setup-python.outputs.python-path }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - run: npm ci
      - run: npm run build

      - name: Package Windows installer
        run: >
          npx electron-builder
          --win nsis
          --x64
          --publish never
          --config.directories.output=release/windows

      - name: Prepare artifact
        shell: pwsh
        run: |
          $pkg = Get-ChildItem -Path "release/windows" -Filter "*.exe" -File | Select-Object -First 1
          if (-not $pkg) { throw "No EXE produced" }
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item $pkg.FullName artifacts/LatexDo-windows-x64.exe

      - uses: actions/upload-artifact@v7
        with:
          name: latexdo-windows
          path: artifacts/LatexDo-windows-x64.exe
          if-no-files-found: error
          retention-days: 1

  publish:
    name: publish / website downloads
    needs: [build_macos, build_windows]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: latexdo-*
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        shell: bash
        run: ls -lh artifacts/

      - name: Generate checksums
        shell: bash
        run: |
          cd artifacts
          test -f LatexDo-macos-arm64.dmg
          test -f LatexDo-macos-x64.dmg
          test -f LatexDo-windows-x64.exe
          sha256sum *.dmg *.exe > SHA256SUMS.txt

      - name: Resolve release metadata
        id: release_metadata
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          version="${version#v}"
          tag="v${version}"

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            tag="${GITHUB_REF_NAME}"
            tag_version="${tag#v}"
            if [ "$tag_version" != "$version" ]; then
              echo "::error::Git tag $tag does not match package.json version $version."
              exit 1
            fi
          fi

          {
            echo "version=$version"
            echo "tag=$tag"
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_metadata.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release_metadata.outputs.version }}
        shell: bash
        run: |
          assets=(
            artifacts/LatexDo-macos-arm64.dmg
            artifacts/LatexDo-macos-x64.dmg
            artifacts/LatexDo-windows-x64.exe
            artifacts/SHA256SUMS.txt
          )

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" \
              --target "$GITHUB_SHA" \
              --title "LatexDo v${RELEASE_VERSION}" \
              --notes "LatexDo v${RELEASE_VERSION} desktop installers."
          fi

      - name: Build downloads website
        env:
          LATEXDO_DOWNLOAD_BASE_URL: https://latexdo.org
          LATEXDO_RELEASE_VERSION: ${{ steps.release_metadata.outputs.version }}
          LATEXDO_RELEASE_ASSET_BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ steps.release_metadata.outputs.tag }}
        run: node scripts/build-downloads-page.mjs artifacts public-downloads/downloads

      - name: Select deploy mode
        id: deploy_mode
        env:
          LATEXDO_WEBSITE_TOKEN: ${{ secrets.LATEXDO_WEBSITE_TOKEN }}
        shell: bash
        run: |
          if [ -z "$LATEXDO_WEBSITE_TOKEN" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            {
              echo "### Downloads deploy skipped"
              echo
              echo "Set LATEXDO_WEBSITE_TOKEN with write access to latexdo/latexdo.org to publish installers to /downloads/."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Deploy downloads to latexdo.org
        if: ${{ steps.deploy_mode.outputs.enabled == 'true' }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          external_repository: latexdo/latexdo.org
          publish_branch: main
          publish_dir: ./public-downloads
          keep_files: true
          personal_token: ${{ secrets.LATEXDO_WEBSITE_TOKEN }}
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_message: Publish LatexDo downloads from latexdo@${{ github.sha }}

      - name: Verify deployed downloads
        if: ${{ steps.deploy_mode.outputs.enabled == 'true' }}
        env:
          LATEXDO_VERIFY_RETRIES: 24
          LATEXDO_VERIFY_DELAY_MS: 10000
          LATEXDO_RELEASE_ASSET_BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ steps.release_metadata.outputs.tag }}
        run: node scripts/verify-deployed-downloads.mjs https://latexdo.org/downloads/
