name: latexdo-release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: latexdo-release
  cancel-in-progress: true

jobs:
  quality:
    name: test / typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run typecheck

  build_macos:
    name: build / macOS (${{ matrix.label }})
    needs: quality
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Apple Silicon
            runner: macos-15
            arch: arm64
            artifact: macos-arm64
            asset: LatexDo-macos-arm64.dmg
          - label: Intel
            runner: macos-15-intel
            arch: x64
            artifact: macos-x64
            asset: LatexDo-macos-x64.dmg

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Python for native modules
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Configure node-gyp Python
        shell: bash
        run: |
          echo "PYTHON=${{ steps.setup-python.outputs.python-path }}" >> "$GITHUB_ENV"
          echo "NODE_GYP_FORCE_PYTHON=${{ steps.setup-python.outputs.python-path }}" >> "$GITHUB_ENV"

      - run: npm ci
      - run: npm run build

      - name: Configure Apple signing and notarization
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          LEGACY_CSC_LINK: ${{ secrets.CSC_LINK }}
          LEGACY_CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          certificate_p12="${MACOS_CERTIFICATE_P12:-${LEGACY_CSC_LINK:-}}"
          certificate_password="${MACOS_CERTIFICATE_PASSWORD:-${LEGACY_CSC_KEY_PASSWORD:-}}"

          missing=()
          if [ -z "$certificate_p12" ]; then
            missing+=("MACOS_CERTIFICATE_P12")
          fi
          if [ -z "$certificate_password" ]; then
            missing+=("MACOS_CERTIFICATE_PASSWORD")
          fi
          for name in APPLE_API_KEY_P8 APPLE_API_KEY_ID APPLE_API_ISSUER APPLE_TEAM_ID; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Refusing to publish a macOS release without Developer ID signing and notarization. Missing: ${missing[*]}"
            exit 1
          fi

          api_key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          if ! printf '%s' "$APPLE_API_KEY_P8" | base64 --decode > "$api_key_path"; then
            echo "::error::APPLE_API_KEY_P8 must be base64-encoded .p8 content."
            exit 1
          fi
          chmod 600 "$api_key_path"

          {
            echo "CSC_LINK=$certificate_p12"
            echo "CSC_KEY_PASSWORD=$certificate_password"
            echo "APPLE_API_KEY=$api_key_path"
            echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID"
            echo "APPLE_API_ISSUER=$APPLE_API_ISSUER"
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
          } >> "$GITHUB_ENV"

      - name: Disable Spotlight indexing
        run: sudo mdutil -a -i off

      - name: Sign, notarize, and package macOS DMG
        run: >
          npx electron-builder
          --mac dmg zip
          --${{ matrix.arch }}
          --publish never
          --config.forceCodeSigning=true
          --config.directories.output=release/${{ matrix.arch }}

      - name: Test packaged macOS application
        shell: bash
        run: |
          executable="$(find "release/${{ matrix.arch }}" -type f -path '*/LatexDo.app/Contents/MacOS/LatexDo' -print -quit)"
          if [ -z "$executable" ]; then
            echo "The packaged macOS executable was not found."
            exit 1
          fi
          "$executable" --smoke-test

      - name: Prepare artifact
        shell: bash
        run: |
          pkg="$(find "release/${{ matrix.arch }}" -maxdepth 1 -type f -name '*.dmg' -print -quit)"
          [ -n "$pkg" ] || { echo "No DMG produced"; exit 1; }
          mkdir -p artifacts
          cp "$pkg" "artifacts/${{ matrix.asset }}"

      - name: Verify Gatekeeper acceptance
        run: >
          bash scripts/verify-macos-release.sh
          "artifacts/${{ matrix.asset }}"
          "$APPLE_TEAM_ID"

      - uses: actions/upload-artifact@v7
        with:
          name: latexdo-${{ matrix.artifact }}
          path: artifacts/*
          if-no-files-found: error
          retention-days: 1

  build_windows:
    name: build / Windows
    needs: quality
    runs-on: windows-2022
    timeout-minutes: 30
    env:
      GYP_MSVS_VERSION: "2022"
      npm_config_msvs_version: "2022"

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Python for native modules
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Configure node-gyp Python
        shell: pwsh
        run: |
          "PYTHON=${{ steps.setup-python.outputs.python-path }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "NODE_GYP_FORCE_PYTHON=${{ steps.setup-python.outputs.python-path }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - run: npm ci
      - run: npm run build

      - name: Package Windows installer
        run: >
          npx electron-builder
          --win nsis
          --x64
          --publish never
          --config.directories.output=release/windows

      - name: Prepare artifact
        shell: pwsh
        run: |
          $pkg = Get-ChildItem -Path "release/windows" -Filter "*.exe" -File | Select-Object -First 1
          if (-not $pkg) { throw "No EXE produced" }
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item $pkg.FullName artifacts/LatexDo-windows-x64.exe

      - uses: actions/upload-artifact@v7
        with:
          name: latexdo-windows
          path: artifacts/LatexDo-windows-x64.exe
          if-no-files-found: error
          retention-days: 1

  publish:
    name: publish / rolling release
    needs: [build_macos, build_windows]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: latexdo-*
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        shell: bash
        run: ls -lh artifacts/

      - name: Generate checksums
        shell: bash
        run: |
          cd artifacts
          test -f LatexDo-macos-arm64.dmg
          test -f LatexDo-macos-x64.dmg
          test -f LatexDo-windows-x64.exe
          sha256sum *.dmg *.exe > SHA256SUMS.txt

      - name: Delete old rolling release and tag
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release delete rolling --cleanup-tag --yes 2>/dev/null || true

      - name: Create rolling release
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          GIT_SHA: ${{ github.sha }}
        shell: bash
        run: |
          case "$EVENT_NAME" in
            push)
              notes="Automated build from main at ${GIT_SHA}."
              ;;
            *)
              notes="Manual rolling build from ${GIT_SHA}."
              ;;
          esac

          notes="${notes}

          macOS: Apple Silicon and Intel DMGs are signed, notarized, and verified with Gatekeeper before publishing."

          gh release create rolling \
            --repo "${{ github.repository }}" \
            --title "Latest build ($(date +'%Y-%m-%d %H:%M UTC'))" \
            --notes "$notes" \
            --latest

      - name: Upload macOS artifact
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload rolling \
            --repo "${{ github.repository }}" \
            artifacts/LatexDo-macos-arm64.dmg \
            artifacts/LatexDo-macos-x64.dmg \
            --clobber

      - name: Upload Windows artifact
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload rolling \
            --repo "${{ github.repository }}" \
            artifacts/LatexDo-windows-x64.exe --clobber

      - name: Upload checksums
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload rolling \
            --repo "${{ github.repository }}" \
            artifacts/SHA256SUMS.txt --clobber
