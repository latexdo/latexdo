name: deploy-editor

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "electron/preload.cts"
      - "build/icon.svg"
      - "index.html"
      - "vite.config.ts"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - ".github/workflows/deploy-editor.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-editor
  cancel-in-progress: true

jobs:
  deploy:
    name: deploy / editor.latexdo.org
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run type checks
        run: npm run typecheck

      - name: Build web editor
        run: npx vite build

      - name: Configure editor custom domain
        shell: bash
        run: |
          echo "editor.latexdo.org" > dist/CNAME
          touch dist/.nojekyll

      - name: Deploy web editor
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_message: Deploy editor from latexdo@${{ github.sha }}
