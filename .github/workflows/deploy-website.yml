name: deploy-website

on:
  push:
    branches:
      - main
    paths:
      - "website/**"
      - "build/icon.svg"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-website
  cancel-in-progress: true

jobs:
  deploy:
    name: deploy / latexdo.org
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: latexdo-org-deploy
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Build TypeScript website
        shell: bash
        run: |
          npm ci --prefix website
          npm run build --prefix website

      - name: Prepare static website
        shell: bash
        run: |
          mkdir -p website/assets
          cp build/icon.svg website/assets/icon.svg
          # Downloads and update feeds are owned by latexdo-release. Leaving them
          # out of publish_dir lets keep_files preserve every versioned release.
          rm -rf website/downloads website/updates
          rm -rf website/node_modules website/src website/.github
          rm -f website/package.json website/package-lock.json website/tsconfig.json website/.gitignore

      - name: Select deploy mode
        id: deploy_mode
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          LATEXDO_WEBSITE_TOKEN: ${{ secrets.LATEXDO_WEBSITE_TOKEN }}
        shell: bash
        run: |
          missing=()
          if [ -z "$LATEXDO_WEBSITE_TOKEN" ]; then
            missing+=("LATEXDO_WEBSITE_TOKEN")
          fi
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            missing+=("CLOUDFLARE_API_TOKEN")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            {
              echo "### Website deploy skipped"
              echo
              echo "Missing required secrets: ${missing[*]}."
              echo "Set LATEXDO_WEBSITE_TOKEN for latexdo/latexdo.org updates and CLOUDFLARE_API_TOKEN for the Cloudflare Workers assets deploy."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Checkout latexdo.org
        if: ${{ steps.deploy_mode.outputs.enabled == 'true' }}
        uses: actions/checkout@v6
        with:
          repository: latexdo/latexdo.org
          ref: main
          path: latexdo-org-site
          token: ${{ secrets.LATEXDO_WEBSITE_TOKEN }}

      - name: Update latexdo.org website
        if: ${{ steps.deploy_mode.outputs.enabled == 'true' }}
        shell: bash
        run: |
          rsync -a website/ latexdo-org-site/

          git -C latexdo-org-site config user.name "github-actions[bot]"
          git -C latexdo-org-site config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C latexdo-org-site add -A

          if git -C latexdo-org-site diff --cached --quiet; then
            echo "No latexdo.org website changes to commit."
          else
            git -C latexdo-org-site commit \
              -m "Deploy website from latexdo@${GITHUB_SHA} [skip ci] [skip actions]" \
              -m "skip-checks:true"
            git -C latexdo-org-site push origin HEAD:main
          fi

      - name: Deploy website to Cloudflare
        if: ${{ steps.deploy_mode.outputs.enabled == 'true' }}
        working-directory: latexdo-org-site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx --yes wrangler@latest deploy
