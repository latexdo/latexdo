name: deploy-website

on:
  push:
    branches:
      - main
    paths:
      - "website/**"
      - "build/icon.svg"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-website
  cancel-in-progress: true

jobs:
  deploy:
    name: deploy / latexdo.org
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: latexdo-org-deploy
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Build TypeScript website
        shell: bash
        run: |
          npm ci --prefix website
          npm run build --prefix website

      - name: Prepare static website
        shell: bash
        run: |
          mkdir -p website/assets
          cp build/icon.svg website/assets/icon.svg
          # Downloads and update feeds are owned by latexdo-release. Leaving them
          # out of publish_dir lets keep_files preserve every versioned release.
          rm -rf website/downloads website/updates
          rm -rf website/node_modules website/src website/.github
          rm -f website/package.json website/package-lock.json website/tsconfig.json website/.gitignore

      - name: Select deploy mode
        id: deploy_mode
        env:
          LATEXDO_WEBSITE_TOKEN: ${{ secrets.LATEXDO_WEBSITE_TOKEN }}
        shell: bash
        run: |
          if [ -z "$LATEXDO_WEBSITE_TOKEN" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            {
              echo "### Website deploy skipped"
              echo
              echo "Set the LATEXDO_WEBSITE_TOKEN repository secret with write access to latexdo/latexdo.org to publish automatically."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Deploy to latexdo.org
        if: ${{ steps.deploy_mode.outputs.enabled == 'true' }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          external_repository: latexdo/latexdo.org
          publish_branch: main
          publish_dir: ./website
          keep_files: true
          personal_token: ${{ secrets.LATEXDO_WEBSITE_TOKEN }}
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_message: Deploy website from latexdo@${{ github.sha }}
